name: Build Dogfood APK

on:
  schedule:
    - cron: '0 2 * * *'
  push:
    branches:
      - 'dogfood'
  workflow_dispatch:

jobs:
  build_debug:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.1
        with:
          fetch-depth: 0
          # Optional: If you want the cron job to ALWAYS build the dogfood branch 
          # instead of your default branch, uncomment the line below:
          # ref: 'dogfood'

      - name: Decode and restore keystore
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 --decode > release-keystore.jks

      - name: Set Up JDK
        uses: actions/setup-java@v5.2.0
        with:
          distribution: "zulu"
          java-version: "25.0.2+10"
          cache: "gradle"

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Clean up previous release and tag
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            try {
              // 1. Find the release by tag
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: 'dogfood'
              });
              
              // 2. Delete the release
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id
              });
              
              // 3. Delete the tag reference
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'tags/dogfood'
              });
              
              console.log('Successfully deleted existing release and tag.');
            } catch (error) {
              console.log('No existing release/tag found, proceeding safely.', error.message);
            }

      # Notice we removed the manual "git push origin :refs/tags/..." steps. 
      # The softprops action will cleanly recreate the tag for us.

      - name: Build APK Dogfood
        run: ./gradlew assembleDebug
        env:
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          CI: true

      - name: Rename APK for Release
        run: |
          apk_file=$(find app/build/outputs/apk/debug -name "*-debug.apk")
          mv "$apk_file" "Ambient-Music-dogfood-signed.apk"

      - name: Create Pre-Release on GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: Dogfood Build (Debugging Only)
          # Hardcoding the tag name prevents namespace collisions with the 'dogfood' branch
          tag_name: dogfood
          # Explicitly targets the commit that triggered the workflow
          target_commitish: ${{ github.sha }}
          files: Ambient-Music-dogfood-signed.apk
          body: |
            This is a signed debug pre-release for testing purposes only. Do not install unless you intend to bug report or test out the latest features.
            Built from the [debug branch](https://github.com/sourajitk/Ambient-Music/tree/dogfood).
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}